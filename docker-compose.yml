version: "3.8"

services:
  # 服务 1：获取 M3U 数据
  iptv_fetcher:
    image: curlimages/curl:latest
    container_name: iptv_fetcher
    volumes:
      - ./data:/data
    restart: unless-stopped
    # 每 30 秒拉取一次并原子性替换本地文件 iptv.m3u
    command: sh -c 'while true; do curl -fsSL "https://gh-proxy.com/https://raw.githubusercontent.com/yaojiwei520/IPTV/refs/heads/main/iptv.m3u" -o /data/iptv.m3u.tmp && mv /data/iptv.m3u.tmp /data/iptv.m3u && echo "$(date -Iseconds) updated"; sleep 30; done'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # 服务 2：测速清洗数据
  iptv_speedtest:
    build:
      context: .
      dockerfile: Dockerfile.speedtest
    image: iptv-speedtest:latest
    container_name: iptv_speedtest
    volumes:
      - ./data:/data
      - ./scripts:/app/scripts:ro
    environment:
      # M3U 文件路径（由 iptv_fetcher 提供）
      M3U_FILE: /data/iptv.m3u
      # 测速结果数据库路径
      DB_PATH: /data/iptv_speedtest.db
      # 测速间隔（秒）- 默认 3600 秒（1小时）
      TEST_INTERVAL: 3600
      # 单个频道超时时间（秒）
      TEST_TIMEOUT: 5
      # Python 日志
      PYTHONUNBUFFERED: 1
    restart: unless-stopped
    # 等待 iptv_fetcher 启动后再启动测速服务
    depends_on:
      - iptv_fetcher
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # 服务 3：静态文件服务器（nginx） - 将 ./data 中的文件通过 HTTP 暴露
  nginx:
    image: nginx:stable-alpine
    container_name: iptv_nginx
    volumes:
      - ./data:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5353:80"
    restart: unless-stopped
    depends_on:
      - iptv_fetcher
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
