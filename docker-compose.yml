version: '3.8'

services:
  iptv_nginx:
    image: nginx:alpine
    container_name: iptv_nginx
    network_mode: host
    volumes:
      - ${DATA_DIR:-./data}:/data:ro
      - ${NGINX_CONFIG:-./nginx}:/etc/nginx/conf.d:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  iptv_fetcher:
    image: curlimages/curl:latest
    container_name: iptv_fetcher
    network_mode: host
    volumes:
      - ${DATA_DIR:-./data}:/data
    environment:
      - SOURCE_URL=${SOURCE_URL:-https://gh-proxy.com/https://raw.githubusercontent.com/yaojiwei520/IPTV/refs/heads/main/iptv.m3u}
      - FETCH_INTERVAL=${FETCH_INTERVAL:-3600}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  iptv_speedtest:
    image: ghcr.io/yao1987825/iptv-speedtest:latest
    container_name: iptv_speedtest
    network_mode: host
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ${SCRIPTS_DIR:-./scripts}:/app/scripts:ro
    environment:
      - TZ=Asia/Shanghai
      - TEST_INTERVAL=${TEST_INTERVAL:-180}
      - TEST_TIMEOUT=${TEST_TIMEOUT:-5}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
