version: "3.8"

services:
  # 服务 1：获取 M3U 数据（每小时拉取一次）
  iptv_fetcher:
    image: curlimages/curl:latest
    container_name: iptv_fetcher
    network_mode: host
    volumes:
      - /mnt/mmcblk2p4/iptv-speedtest/data:/data
    restart: unless-stopped
    # 每 3600 秒（1小时）拉取一次并原子性替换本地文件
    command: sh -c 'while true; do curl -fsSL "https://gh-proxy.com/https://raw.githubusercontent.com/yaojiwei520/IPTV/refs/heads/main/iptv.m3u" -o /data/iptv.m3u.tmp && mv /data/iptv.m3u.tmp /data/iptv.m3u && echo "$(date -Iseconds) updated"; sleep 3600; done'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Nginx 文件服务器
  nginx:
    image: nginx:alpine
    container_name: iptv_nginx
    ports:
      - "5353:80"
    volumes:
      - /mnt/mmcblk2p4/iptv-speedtest/data:/data
      - /mnt/mmcblk2p4/iptv-speedtest/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  iptv_speedtest:
    build:
      context: /mnt/mmcblk2p4/iptv-speedtest
      dockerfile: Dockerfile.speedtest
    image: iptv-speedtest:latest
    container_name: iptv_speedtest
    network_mode: host
    volumes:
      - /mnt/mmcblk2p4/iptv-speedtest/data:/data
      - /mnt/mmcblk2p4/iptv-speedtest/scripts:/app/scripts:ro
    environment:
      # M3U 文件路径（需要由 docker-compose.yml 中的 iptv_fetcher 提供）
      M3U_FILE: /data/iptv.m3u
      # 数据库路径
      DB_PATH: /data/iptv_speedtest.db
      # TV M3U 输出路径（有效频道列表）
      TV_M3U_PATH: /data/tv.m3u
      # 测速间隔（秒）- 默认 180 秒（3分钟）
      TEST_INTERVAL: 180
      # 单个频道超时时间（秒）
      TEST_TIMEOUT: 5
      # Python 日志
      PYTHONUNBUFFERED: 1
    restart: unless-stopped
    # 依赖：确保数据已准备好（可选）
    depends_on:
      - iptv_fetcher
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
